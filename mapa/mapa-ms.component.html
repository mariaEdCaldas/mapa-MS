          *ngIf="tooltipVisivel && tooltipData"
          [style.left.px]="tooltipX"
          [style.top.px]="tooltipY"
        >
          <div class="tooltip-header">
            <strong>{{ tooltipData.faixa === 'SEM_NOTA' ? tooltipData.nome : tooltipData.faixa }}</strong>
          </div>
          <div class="tooltip-body">
            <!-- Lista de municípios quando tem grupo -->
            <div class="tooltip-municipios-lista" *ngIf="tooltipData.faixa !== 'SEM_NOTA'">
              <div class="municipios-scroll">
                <div 
                  *ngFor="let municipio of getMunicipiosDoGrupo(tooltipData.faixa)"
                  class="municipio-item-tooltip"
                  [class.hover]="municipio === municipioHoverAtual">
                  {{ municipio }}
                </div>
              </div>
            </div>
            
            <!-- Informações quando é sem nota -->
            <div *ngIf="tooltipData.faixa === 'SEM_NOTA'" class="tooltip-item">
              <span class="tooltip-value">Sem dados disponíveis</span>
            </div>
          </div>
        </div>
      </div>
